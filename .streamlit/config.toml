[theme]
base                     = "light"
primaryColor             = "#4f46e5"
backgroundColor          = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor                = "#1e1e2e"
font                     = "sans serif"

[server]
headless                 = true
enableCORS               = false
enableXsrfProtection     = false
enableWebsocketCompression = false
maxUploadSize            = 50

[browser]
gatherUsageStats         = false
